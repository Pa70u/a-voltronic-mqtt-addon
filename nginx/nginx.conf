server {
    listen 80;
    server_name garagedelamontagne.fr www.garagedelamontagne.fr;
    return 301 https://garagedelamontagne.fr$request_uri;
}

server {
    listen 443 ssl;
    server_name garagedelamontagne.fr;

    ssl_certificate     /etc/letsencrypt/live/garagedelamontagne.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/garagedelamontagne.fr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript;

    # Proxy vers l'API FastAPI
    location /api/ {
        proxy_pass http://garage_api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        if ($request_method = OPTIONS) { return 204; }
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000" always;
    }
}
