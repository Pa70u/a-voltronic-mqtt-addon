            ${th('numero','Numéro')}
            ${th('nom','Client')}
            ${th('immatriculation','Véhicule')}
            ${th('total_ht','Total HT')}
            <th>TVA</th>
            ${th('total_ttc','Total TTC')}
            ${th('statut','Statut')}
            ${th('created_at','Date')}
            <th style="width:100px">Actions</th>
          </tr></thead>
          <tbody>
            ${p.items.length ? p.items.map(d=>`
              <tr>
                <td><strong>${d.numero}</strong></td>
                <td>${d.prenom} ${d.nom}</td>
                <td>${d.immatriculation?`<span class="td-mono">${d.immatriculation}</span>`:'—'}</td>
                <td>${fmt(d.total_ht)} €</td>
                <td>${d.tva}%</td>
                <td><strong style="color:var(--accent)">${fmt(d.total_ttc)} €</strong></td>
                <td>${badge(d.statut)}</td>
                <td style="color:var(--muted)">${fmtDate(d.created_at)}</td>
                <td style="display:flex;gap:4px">
                  <button class="loupe-btn" id="loupe_d${d.id}" onclick="toggleDetail('d'+${d.id}, detailDevis(devisData.find(x=>x.id===${d.id})))">🔍</button>
                  <button class="btn btn-ghost" style="padding:3px 8px;font-size:11px" onclick="editerDevis(${d.id})">✏️</button>
                  ${d.statut!=='facture'?`<button class="btn btn-success" style="padding:3px 8px;font-size:11px" onclick="convertirDevis(${d.id},'${d.numero}')">→ FAC</button>`:''}
                </td>
              </tr>
              <tr class="detail-row" id="detail_d${d.id}" style="display:none"><td colspan="9"></td></tr>
            `).join('') : '<tr><td colspan="9" class="empty">Aucun devis</td></tr>'}
          </tbody>
        </table>
      </div>
      ${paginationHTML(p,'renderDevis')}
    </div>
  `);
  document.querySelectorAll('[data-sort-ns="devis"]').forEach(el=>{
    const s=sortState['devis'];
    if(s&&el.dataset.sortKey===s.key) el.classList.add(s.dir);
  });
}

// ── renderFactures PATCHED ─────────────────────────────────────────────────
function renderFactures(page=1) {
  facturesPage=page;
  let filtered = facturesData;
  if (facturesFilter) filtered=filtered.filter(f=>`${f.numero} ${f.nom||''} ${f.prenom||''} ${f.immatriculation||''}`.toLowerCase().includes(facturesFilter.toLowerCase()));
  if (facturesStatut) filtered=filtered.filter(f=>f.statut===facturesStatut);
  filtered = applySort('factures', filtered);
  const p = paginate(filtered,page,30);
  const ca_total=filtered.reduce((s,f)=>s+(f.total_ttc||0),0);
  const th = (key,label) => thSort('factures',key,label,'renderFactures');
  setPage('Factures', `
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:1rem">
      <div class="stat-card s-accent"><div class="stat-label">CA filtré</div><div class="stat-value" style="font-size:20px">${fmt(ca_total)} €</div></div>
      <div class="stat-card s-green"><div class="stat-label">Payées</div><div class="stat-value">${filtered.filter(f=>f.statut==='payee').length}</div></div>
      <div class="stat-card s-red"><div class="stat-label">Impayées</div><div class="stat-value">${filtered.filter(f=>f.statut==='impayee').length}</div></div>
    </div>
    <div class="search-bar">
      <input type="text" placeholder="🔍  Numéro, client, véhicule..." value="${facturesFilter}" oninput="debouncedFactureSearch(this.value,this)">
      <select onchange="facturesStatut=this.value;renderFactures(1)">
        <option value="">Tous statuts</option>
        <option value="impayee" ${facturesStatut==='impayee'?'selected':''}>Impayées</option>
        <option value="payee" ${facturesStatut==='payee'?'selected':''}>Payées</option>
      </select>
      <button class="btn btn-primary" onclick="ouvrirNouvelleFicheFacture(0)">+ Nouvelle facture</button>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            ${th('numero','Numéro')}
            ${th('nom','Client')}
            ${th('immatriculation','Véhicule')}
            ${th('total_ht','Total HT')}
            <th>TVA</th>
            ${th('total_ttc','Total TTC')}
            ${th('statut','Statut')}
            ${th('date_echeance','Échéance')}
            <th style="width:80px">Actions</th>
          </tr></thead>
          <tbody>
            ${p.items.length ? p.items.map(f=>`
              <tr>
                <td><strong>${f.numero}</strong></td>
                <td>${f.prenom||''} ${f.nom||''}</td>
                <td>${f.immatriculation?`<span class="td-mono">${f.immatriculation}</span>`:'—'}</td>
                <td>${fmt(f.total_ht)} €</td>
                <td>${f.tva}%</td>
                <td><strong style="color:var(--accent)">${fmt(f.total_ttc)} €</strong></td>
                <td>${badge(f.statut)}</td>
                <td style="color:${new Date(f.date_echeance)<new Date()&&f.statut==='impayee'?'var(--red)':'var(--muted)'}">${fmtDate(f.date_echeance)}</td>
                <td style="display:flex;gap:4px">
                  <button class="loupe-btn" id="loupe_f${f.id}" onclick="toggleDetail('f'+${f.id}, detailFacture(facturesData.find(x=>x.id===${f.id})))">🔍</button>
                  ${f.statut==='impayee'?`<button class="btn btn-success" style="padding:3px 8px;font-size:11px" onclick="marquerPayee(${f.id})">✓</button>`:''}
                </td>
              </tr>
              <tr class="detail-row" id="detail_f${f.id}" style="display:none"><td colspan="9"></td></tr>
            `).join('') : '<tr><td colspan="9" class="empty">Aucune facture</td></tr>'}
          </tbody>
        </table>
      </div>
      ${paginationHTML(p,'renderFactures')}
    </div>
  `);
  document.querySelectorAll('[data-sort-ns="factures"]').forEach(el=>{
    const s=sortState['factures'];
    if(s&&el.dataset.sortKey===s.key) el.classList.add(s.dir);
  });
}

</script>
</body>
</html>
